<!DOCTYPE html>
<html>
<head>
<title>Example 2</title>
<style>

h1 {
    font-size: 40px;
    color: darkgoldenrod 
}

.container {
    background: gold;
}

.box1 {
    width: 150px;
    border: 3px solid black;
    margin: 50px;
    padding: 10px;
    background: goldenrod;
}

.box2 {
    width: 150px;
    border: 3px solid black;
    margin: 10px;
    padding: 40px;
    background: yellow;
}

</style>
</head>
<body>
<h1><b>Margin and Padding</b></h1>
<div class="container">
    <div class="box1">Big margin, small padding</div>
    <div class="box2">Small margin, big padding</div>
</div>

</body>
</html>
