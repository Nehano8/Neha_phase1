<!DOCTYPE html>
<html>
<head>
    <title>Card Design</title>

    <style>
        body {
            font-family: 'Times New Roman', Times, serif, sans-serif;
            background: violet;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 300px;

            padding: 20px;          
            margin: 20px;           
            border: 1px solid #080606; 

            background: grey;
            border-radius: 10px;

            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h2 {
            margin: 15px 0 10px;  
        }

        .card p {
            margin: 10px 0;
            color: indigo;
        }

        .card button {
            margin-top: 15px;
            padding: 10px 20px;

            background: lightgoldenrodyellow;
            color: violet;
            border: none;
            border-radius: 5px;

            cursor: pointer;
        }

        .card button:hover {
            background: lightgrey;
        }
    </style>
</head>

<body>

<div class="card">
    <img src="https://www.jiomart.com/images/product/600x600/491630714/layer-r-wottagirl-grace-perfume-spray-100-ml-product-images-o491630714-p590113415-2-202203170620.jpg" alt="Product Image">

    <h2>Wottagirl Perfume</h2>

    <p>Amazing and refreshing fragrance.</p>

    <button>Buy Now</button>
</div>

</body>
</html>
