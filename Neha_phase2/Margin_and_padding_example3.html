<!DOCTYPE html>
<html>
<head>
<title>Example 3</title>
<style>

h1 {
     font-size: 40px;
    color: darkblue
}

.outer {
    background: lightskyblue;
    padding: 20px;   
}

.inner {
    background: lightblue;
    border: 3px solid black;
    margin: 40px;   
    padding: 20px;  
}

</style>
</head>
<body>

<h1><b>Margin and Padding</b></h1>

<div class="outer">
    Box outside has padding

    <div class="inner">
        Box inside has margin and padding
    </div>
</div>

</body>
</html>
