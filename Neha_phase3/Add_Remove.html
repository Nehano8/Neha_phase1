<!DOCTYPE html>
<html>
<head>
<title>Javascript - Add Remove</title>
</head>
<body>

<input type="button" value="Add element" onclick="add()">
<input type="button" value="Remove element" onclick="removeElement()">

<script>
var a = document.createElement("h1");

function add() {
    a.innerHTML = "Add or Remove";
    document.body.appendChild(a);
}

function removeElement() {
    a.remove();
}
</script>

</body>
</html>
